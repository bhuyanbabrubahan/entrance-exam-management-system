########################################
###       SPRING BOOT SETTINGS       ###
########################################
spring.application.name=JeeEntranceExam
server.port=8080


########################################
###         DATABASE SETTINGS         ###
########################################

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/jeeexam_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=itsbablutime
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Email configuration
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}


########################################
###       THYMELEAF SETTINGS         ###
########################################
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
logging.level.org.thymeleaf=DEBUG


########################################
###         FILE UPLOAD SETTINGS     ###
########################################
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB


# Document upload settings
file.upload.document-base-path=E:/uploads/jee/documents
file.upload.correction-base-path=E:/uploads/jee/documents

file.upload.user-folder-pattern=user_{applicationNo}


########################################
###         SPRING SECURITY          ###
########################################
spring.security.user.name=disabled
spring.security.user.password=disabled


# For localhost development
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

spring.main.allow-circular-references=true



